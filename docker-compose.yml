version: '3.8'

services:
  audio-model:
    build: .
    container_name: audio-model
    ports:
      - "10000:10000"
    environment:
      HOST: 0.0.0.0
      PORT: 10000
      PYTHONUNBUFFERED: '1'
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-tiny}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
    volumes:
      - ./app/temp:/app/temp # Optional: Mount local temp directory to inspect saved files
      - models:/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:10000/"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  models:
    driver: local
